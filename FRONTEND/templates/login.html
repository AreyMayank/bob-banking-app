{% extends "base.html" %}
{% block title %}Login - SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-9 col-md-6 col-lg-5">

    <!-- Card wrapper -->
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4 p-md-5">

        <!-- Header -->
        <div class="text-center mb-4">
          <i class="bi bi-bank2 text-primary" style="font-size: 2.8rem;"></i>
          <h1 class="h4 mt-2 fw-bold">SecureBank</h1>
          <p class="text-muted small">Sign in to your account</p>
        </div>

        <!-- Server-side validation error -->
        {% if error %}
          <div class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
          </div>
        {% endif %}

        <!-- Login form -->
        <form action="{{ url_for('login') }}" method="POST" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-white">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                value="{{ request.form.get('username', '') }}"
                required
                autofocus
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </div>
        </form>

      </div>
    </div>

    <!-- Demo credentials hint (remove in production) -->
    <div class="card border-0 bg-warning-subtle mt-3">
      <div class="card-body py-2 px-3 small text-muted">
        <strong>Demo credentials:</strong>
        alice / password123 &nbsp;|&nbsp; bob / secret456
      </div>
    </div>

  </div>
</div>
{% endblock %}
