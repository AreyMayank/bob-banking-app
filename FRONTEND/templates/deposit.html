{% extends "base.html" %}
{% block title %}Deposit - SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-9 col-md-6 col-lg-5">

    <div class="card shadow-sm border-0 mt-2">
      <div class="card-body p-4 p-md-5">

        <!-- Header -->
        <div class="mb-4">
          <a href="{{ url_for('dashboard') }}" class="text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
          </a>
          <h2 class="h4 fw-bold mt-2 mb-0">
            <i class="bi bi-arrow-down-circle-fill text-success me-2"></i>Deposit Funds
          </h2>
          <p class="text-muted small mt-1">Enter the amount you wish to deposit.</p>
        </div>

        <!-- Server-side error -->
        {% if error %}
          <div class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
          </div>
        {% endif %}

        <!-- Deposit form -->
        <form action="{{ url_for('deposit') }}" method="POST" novalidate>
          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount (USD)</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white fw-bold text-success">$</span>
              <input
                type="number"
                id="amount"
                name="amount"
                class="form-control"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                value="{{ amount if amount is defined else '' }}"
                required
                autofocus
              />
            </div>
            <div class="form-text">Enter a positive amount with up to two decimal places.</div>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="bi bi-check-circle me-2"></i>Confirm Deposit
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
